<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bloomGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#00eaff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bloomPetals" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4dff"/>
      <stop offset="50%" stop-color="#b84dff"/>
      <stop offset="100%" stop-color="#00eaff"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <circle cx="150" cy="150" r="130" fill="url(#bloomGlow)"/>

  <!-- Outer Petals -->
  <g fill="url(#bloomPetals)" stroke="#ffffff" stroke-width="3" opacity="0.9">
    <path d="M150 20 C110 80 100 140 150 170 C200 140 190 80 150 20 Z"/>
    <path d="M60 110 C20 160 40 210 150 230 C120 180 100 150 60 110 Z"/>
    <path d="M240 110 C200 150 180 180 150 230 C260 210 280 160 240 110 Z"/>
  </g>

  <!-- Inner Petals -->
  <g fill="url(#bloomPetals)" stroke="#ffffff" stroke-width="2">
    <path d="M120 140 C90 180 120 220 150 240 C180 220 210 180 180 140 C165 170 135 170 120 140 Z"/>
  </g>
</svg>
